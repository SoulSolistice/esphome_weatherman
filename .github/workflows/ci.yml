name: CI

# Compile and lint on every PR and on pushes to main.
on:
  push:
    branches: [main]
  pull_request:
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Pin ESPHome to the version running on the Home Assistant add-on that flashes
# these devices, so CI validates what will actually ship. Bump this in lockstep
# when you upgrade the add-on. (Previously `pip install esphome` pulled "latest",
# so a new ESPHome release could change schema/codegen behavior in CI relative
# to the OTA-tested build.)
env:
  ESPHOME_VERSION: "2026.6.4"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: run the exact same pre-commit suite developers run locally.
  # Covers YAML (yamllint), Python (ruff), C++ (clang-format), and generic
  # hygiene (trailing whitespace, EOF newline, line endings).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      # Node-24 action majors: GitHub force-migrated runners to Node 24 on
      # 2026-06-16 and removes Node 20 around 2026-09, so the older v4/v5 pins
      # (Node 20) now warn and will hard-fail this autumn.
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Check language packs are key-for-key identical
        run: |
          pip install --quiet pyyaml
          python - <<'PY'
          import sys, yaml
          keys = {
              code: set(yaml.safe_load(open(f"packages/lang_{code}.yaml"))["substitutions"])
              for code in ("en", "de")
          }
          diff = keys["en"] ^ keys["de"]
          if diff:
              sys.exit(f"language packs are not key-for-key identical: {sorted(diff)}")
          print(f"language packs: {len(keys['en'])} keys, identical")
          PY

  # ---------------------------------------------------------------------------
  # Compile: build the firmware against the IN-REPO packages and component, not
  # the remote tag — so a PR validates the code it actually changes. The matrix
  # exercises the optional SHT21 both on and off (the conditional-include
  # branch) AND both language packs (so a re-diverged German pack — a "/" in a
  # name, a >120-char name, a URL-scheme clash — fails CI instead of only
  # surfacing on a German device). A schema regression or a C++ error in the
  # component fails here before it can reach a tag (and OTA to devices).
  # ---------------------------------------------------------------------------
  compile:
    name: Compile (sht21=${{ matrix.sht21 }}, lang=${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Bare booleans on purpose: written into YAML unquoted below so they
        # parse as real booleans (a quoted "false" would be truthy in the
        # Jinja conditional and wrongly include the package).
        sht21: [true, false]
        language: [en, de]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Cache the PlatformIO toolchain + framework and the ESPHome build dir;
      # the first run is slow (toolchain download), later runs are fast.
      - name: Cache PlatformIO and ESPHome build
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            .esphome
          key: pio-${{ runner.os }}-${{ hashFiles('components/tfa_tx141w/**', 'packages/**') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome==${ESPHOME_VERSION}"

      # Generate a CI entry file at the repo root that:
      #   * uses LOCAL package includes + LOCAL external_components (this PR's
      #     code), instead of pulling the remote tag;
      #   * needs no secrets (plain api/ota, no encryption);
      #   * bakes the matrix sht21/language values in (sht21 as a real YAML
      #     boolean; language as the pack selector).
      #
      # `packages:` is a top-level LIST (the mapping/single-include forms are
      # deprecated as of 2026.7 and the conditional expression is only reliable
      # as a list entry). For LOCAL includes the SHT21 file is pre-included into
      # a substitution (`sht21_pkg`), because !include is resolved before the
      # ${...} expression; the conditional then selects that content or {}.
      #
      # Mirrors the shipping shape: wifi + recovery AP and NO mqtt (MQTT was
      # removed from the product; compiling it here built dead AsyncMqttClient
      # code and a broker the device never uses). `ap:` also satisfies
      # captive_portal, silencing its no-AP validation warning.
      - name: Generate CI config
        run: |
          cat > ci-compile.yaml <<EOF
          substitutions:
            device_name: weatherman-ci
            friendly_name: Weatherman CI
            device_description: "CI build"
            project_name: "SoulSolistice.esphome_weatherman"
            board: d1_mini_pro
            language: ${{ matrix.language }}
            lang_en: !include packages/lang_en.yaml
            lang_de: !include packages/lang_de.yaml
            sht21_enabled: ${{ matrix.sht21 }}
            sht21_pkg: !include packages/sensor_sht21.yaml

          esphome:
            name: \${device_name}
            friendly_name: \${friendly_name}
            comment: \${device_description}
            min_version: 2025.12.0
            project:
              name: \${project_name}
              version: "ci"

          esp8266:
            board: \${board}
            restore_from_flash: true

          # No secrets in CI: plain API (no encryption) and a literal OTA pass.
          api:
          ota:
            - platform: esphome
              password: "ci-only-not-a-real-secret"

          wifi:
            ssid: "ci-ssid"
            password: "ci-password"
            min_auth_mode: WPA2
            ap:
              ssid: "weatherman-ci recovery"
              password: "ci-recovery-pass"

          packages:
            - !include packages/core.yaml
            - \${ language == "de" and lang_de or lang_en }
            - !include packages/sensors_tfa.yaml
            - !include packages/sensors_env.yaml
            - !include packages/derived.yaml
            - !include packages/rain_heater.yaml
            - \${ sht21_enabled and sht21_pkg or {} }

          external_components:
            - source:
                type: local
                path: components
              components: [tfa_tx141w]
          EOF
          echo "----- generated ci-compile.yaml -----"
          cat ci-compile.yaml

      # `config` first for a fast schema/merge/substitution check with a clear
      # error surface, then a full `compile` (which also compiles the C++).
      - name: Validate config
        run: esphome config ci-compile.yaml

      - name: Compile firmware
        run: esphome compile ci-compile.yaml

  # ---------------------------------------------------------------------------
  # Validate the REAL entry file through the remote-pull plumbing users depend
  # on: git `packages:` + `external_components:`, the conditional-include
  # expression, and the `lang_${language}` path interpolation. The compile job
  # above swaps all of that for local includes, so this is the ONLY job that
  # exercises the remote package machinery and the entry file as shipped.
  #
  # Runs only when the ref IS main (push to main, or a manual dispatch from
  # main): the entry file pulls packages at `ref: main`, so this is exactly the
  # condition under which remote main == the checked-out tree. On a PR (or a
  # dispatch from a feature branch) it would validate STALE main against new
  # local code, which is misleading — hence skipped there. `config` only (no
  # compile): the compile job already covers codegen; this guards merge/plumbing.
  # ---------------------------------------------------------------------------
  validate-entry:
    name: Validate entry file (remote packages)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install "esphome==${ESPHOME_VERSION}"

      # Dummy, non-secret values so the !secret-bearing blocks resolve. The API
      # key must be a real base64 32-byte value, so generate one at run time.
      - name: Write dummy secrets
        working-directory: example
        run: |
          cat > secrets.yaml <<EOF
          wifi-ssid: "ci-ssid"
          wifi-password: "ci-password"
          wifi-ap-password: "ci-recovery-pass"
          esphome-api: "$(openssl rand -base64 32)"
          esphome-ota: "ci-ota-pass"
          EOF

      - name: Validate entry file config
        working-directory: example
        run: esphome config weatherman.yaml

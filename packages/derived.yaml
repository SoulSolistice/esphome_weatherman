  ## wm_barotrend - meteorological pressure trend (NOAA-style categorization)
  ## Categories: rapid / steady / slow / stable, signed for rise/fall.
  ## Boundaries from NOAA/typical meteorological practice:
  ##   |Δp| > 6.0  hPa/3h: rapid change (storm / fast clearing)
  ##   |Δp| > 1.35 hPa/3h: steady change (typical front passage)
  ##   |Δp| > 0.1  hPa/3h: slow change (minor adjustment)
  ##   otherwise: stable
  - platform: template
    name: "${name_baro_trend}"
    id: baro_trend
    icon: "mdi:gauge"
    update_interval: 60s
    web_server:
      sorting_group_id: wsg_pressure
      sorting_weight: 30
    lambda: |-
      const float d = id(pressure_change_3h).state;
      if (std::isnan(d)) return std::string("");  // no data → unknown, NOT "stabil" (which is a real calm state)
      const float a = fabsf(d);
      if (a < 0.1f)  return std::string("stabil");
      const bool rising = d > 0.0f;
      if (a > 6.0f)  return std::string(rising ? "schnell steigend" : "schnell fallend");
      if (a > 1.35f) return std::string(rising ? "steigend" : "fallend");
      return std::string(rising ? "langsam steigend" : "langsam fallend");

interval:
  ## Snapshot pressure every 3 hours for barotrend
  - interval: 3h
    then:
      - lambda: |-
          const float p = id(pressure_sealevel_hpa).state;
          if (!std::isnan(p)) id(pressure_3h_ago) = p;  // don't snapshot NaN — it would blank the trend for 3h

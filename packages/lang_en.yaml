# packages/lang_en.yaml
#
# Display NAMES for Weatherman entities (English). GENERATED — edit the values
# here, but keep this file and lang_de.yaml key-for-key identical (CI checks).
#
# Scope: Home Assistant does NOT localize ESPHome entity names — it shows the
# string here verbatim. These English values mirror the in-firmware defaults,
# so an English build renders exactly as before. Deliberately NOT here (HA
# localizes per viewer): units (device_class + unit_of_measurement), enum /
# binary STATE values (e.g. a moisture binary_sensor's Wet/Dry), and weather
# conditions. Keys are grouped by the package file that consumes them.

